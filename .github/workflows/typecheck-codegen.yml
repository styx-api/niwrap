name: Typecheck codegen

# B4 gate: compile the full catalog with styx2 and run the real type-checkers
# (mypy --strict + tsc --noEmit) over the generated Python and TypeScript, so a
# styx2 bump or a descriptor change can't silently emit code that doesn't
# type-check. Mirrors styx2's own scripts/typecheck-codegen.mjs at catalog scale.

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:

jobs:
  typecheck-codegen:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Compile (python + typescript)
      run: bash tooling/compile.sh python,typescript

    - name: Validate Python package metadata (Summary length)
      run: |
        # pyproject's [project] description becomes the core-metadata Summary
        # field, which PyPI rejects (400) above 512 chars - and `twine check`
        # does NOT catch this, only the upload does. Assert it here so a long
        # catalog description fails the PR instead of a partial release upload.
        python - <<'PY'
        import glob, sys, tomllib
        bad = []
        for f in sorted(glob.glob("dist/niwrap-python/*/pyproject.toml")):
            desc = tomllib.load(open(f, "rb")).get("project", {}).get("description", "")
            print(f"{f}: {len(desc)}")
            if len(desc) > 512:
                bad.append((f, len(desc)))
        for f, n in bad:
            print(f"::error file={f}::Summary is {n} chars (>512 PyPI limit)")
        sys.exit(1 if bad else 0)
        PY

    - name: Typecheck Python (mypy --strict)
      run: |
        python -m pip install --quiet mypy styxdefs
        cd dist/niwrap-python
        # Each niwrap_<pkg> is an independent package (imports only styxdefs);
        # the meta `niwrap/` dir holds no code, so check the code packages.
        pkgs=$(for d in */; do [ -e "${d}__init__.py" ] && echo "${d%/}"; done)
        echo "Checking packages: $pkgs"
        python -m mypy --strict --ignore-missing-imports $pkgs

    - name: Typecheck TypeScript (tsc --noEmit)
      working-directory: dist/niwrap-js
      run: |
        npm install --no-audit --no-fund
        npx tsc --noEmit -p tsconfig.json
