name: Test

on:
  push:
    branches:
    - main
    tags:
    - '*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install the latest version of uv
      # full pin: setup-uv stopped publishing rolling major tags (@v8) at v8
      uses: astral-sh/setup-uv@v8.2.0

    - name: Ruff check
      run: uv --directory tooling run ruff check src/

    - name: Ruff format
      run: uv --directory tooling run ruff format --check src/

    - name: Mypy
      run: uv --directory tooling run mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install the latest version of uv
      # full pin: setup-uv stopped publishing rolling major tags (@v8) at v8
      uses: astral-sh/setup-uv@v8.2.0

    - name: Unit tests
      run: uv --directory tooling run pytest

    - name: Test descriptors
      run: uv --directory tooling run wrap test
