name: Hub layout + gate

# Builds the version-first hosted layout the niwrap.dev hub consumes
# (catalog.json + verbatim descriptors) and runs the compiler-lockstep gate:
# compile every descriptor with the pinned @styx-api/core the hub bundles, so a
# compiler regression can't ship a tool that 500s in the browser.
on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:

jobs:
  hub-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Build hosted layout
      run: uv --directory tooling run wrap hub-build --out dist/pages

    - name: Install gate deps
      run: npm --prefix tooling/hub-gate ci

    - name: Compiler-lockstep gate
      run: node tooling/hub-gate/gate.mjs dist/pages

    - name: Install embed deps
      run: npm --prefix tooling/hub-embed ci

    # Cache the transformers.js model download (ONNX weights) across runs. The
    # build-embeddings step pins env.cacheDir to tooling/hub-embed/.cache (outside
    # node_modules, so `npm ci` above doesn't wipe it); this path must match.
    - name: Cache embedding model
      uses: actions/cache@v4
      with:
        path: tooling/hub-embed/.cache
        key: hf-${{ hashFiles('tooling/hub-embed/package-lock.json') }}-Xenova-all-MiniLM-L6-v2

    - name: Precompute semantic-search embeddings
      run: node tooling/hub-embed/build-embeddings.mjs dist/pages
