name: Publish to GitHub Pages (Hub layout)

permissions:
  contents: read
  pages: write
  id-token: write

# Manual deploy of the niwrap.dev/niwrap/ Pages content.
#
# Publishes the version-first hosted layout (index.json + <version>/catalog.json +
# descriptors/) that the architecture-A hub compiles in-browser. The legacy
# artefacts (source/, niwrap-json-schema/, js/) were retired once the hub's H2
# data-layer swap deployed - the hub no longer reads them.
on:
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout main
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Build hosted layout
      run: uv --directory tooling run wrap hub-build --out _site

    - name: Compiler-lockstep gate
      run: |
        npm --prefix tooling/hub-gate ci
        node tooling/hub-gate/gate.mjs _site

    - name: Landing redirect
      run: |
        cat > _site/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://github.com/${{ github.repository }}">
            <link rel="canonical" href="https://github.com/${{ github.repository }}">
            <title>Redirecting to Repository</title>
        </head>
        <body>
            <p>Redirecting to <a href="https://github.com/${{ github.repository }}">repository</a>...</p>
            <script>
                window.location.href = "https://github.com/${{ github.repository }}";
            </script>
        </body>
        </html>
        EOF

    - name: Cache OG card assets (fonts + rasterized logo)
      uses: actions/cache@v4
      with:
        path: tooling/og/.assets
        key: og-assets-v1-${{ hashFiles('logo.svg') }}

    - name: Prepare OG card assets
      run: |
        mkdir -p tooling/og/.assets
        cd tooling/og/.assets
        [ -f Inter.ttf ] || curl -sSfL -o Inter.ttf "https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bopsz,wght%5D.ttf"
        [ -f JetBrainsMono.ttf ] || curl -sSfL -o JetBrainsMono.ttf "https://github.com/google/fonts/raw/main/ofl/jetbrainsmono/JetBrainsMono%5Bwght%5D.ttf"
        [ -f logo.png ] || npx -y sharp-cli -i ../../../logo.svg --density 500 -o logo.png resize 720 900

    - name: Render Open Graph card
      run: uv --directory tooling run --with pillow python og/build_og.py --catalog-dir ../_site --logo og/.assets/logo.png --fonts-dir og/.assets --out ../_site/og-image.png

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
